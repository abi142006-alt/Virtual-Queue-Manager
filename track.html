<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Queue - QueueManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-people-queue"></i> QueueManager
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="map.html">
                    <i class="fas fa-map-marker-alt"></i> Find Locations
                </a>
                <a class="nav-link" href="myqueues.html">
                    <i class="fas fa-list"></i> My Queues
                </a>
                <a class="nav-link" href="#" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-ticket-alt"></i> Track Your Queue
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-4">
                            <label class="form-label"><strong>Enter Ticket ID</strong></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="ticketIdInput" 
                                       placeholder="Enter your ticket ID (e.g., T123456)">
                                <button class="btn btn-primary" onclick="trackTicket()">
                                    <i class="fas fa-search"></i> Track
                                </button>
                            </div>
                        </div>

                        <div class="text-center mb-4">
                            <span class="text-muted">OR</span>
                        </div>

                        <div class="text-center">
                            <button class="btn btn-outline-primary" onclick="loadMyTickets()">
                                <i class="fas fa-user"></i> Show My Active Tickets
                            </button>
                        </div>

                        <div id="queueInfo" class="mt-4" style="display: none;">
                            <h5 class="mb-3">Queue Information</h5>
                            <div class="card">
                                <div class="card-body">
                                    <div id="ticketDetails"></div>
                                    <div class="progress mt-3" style="height: 20px;">
                                        <div id="queueProgress" class="progress-bar" 
                                             role="progressbar" style="width: 0%"></div>
                                    </div>
                                    <div id="queueStats" class="mt-2 text-center"></div>
                                </div>
                            </div>
                        </div>

                        <div id="myTicketsSection" class="mt-4" style="display: none;">
                            <h5 class="mb-3">My Active Tickets</h5>
                            <div id="myTicketsList"></div>
                        </div>

                        <div id="noTicketsMessage" class="alert alert-info mt-4" style="display: none;">
                            No active tickets found.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/track.js"></script>
</body>
</html>
